apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-app2-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Matan-Lahmi/ARGOCD-LESON.git
    targetRevision: HEAD
    path: charts/simple-app2
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true